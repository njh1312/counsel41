<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>상담 관리 시스템</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <h2 class="mb-4">📋 학생 상담 관리</h2>

    <form action="/save" method="post" class="card p-3 mb-4 shadow-sm">
      <div class="mb-2">
        <label>상담자:</label>
        <input
          type="text"
          name="counselor"
          class="form-control"
          placeholder="성함을 입력하세요"
          required
        />
      </div>
      <div class="mb-2">
        <label>대상:</label>
        <select name="target" class="form-select">
          <option value="학생">학생</option>
          <option value="부모">부모</option>
        </select>
      </div>
      <div class="mb-2">
        <label>상담 시간:</label>
        <select name="duration" class="form-select">
          <option value="5">5분</option>
          <option value="10">10분</option>
          <option value="15">15분</option>
          <option value="20">20분</option>
          <option value="25">25분</option>
          <option value="30">30분</option>
        </select>
      </div>
      <div class="mb-2">
        <label>상담 내용:</label>
        <textarea name="content" class="form-control" rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary w-100">기록 저장하기</button>
    </form>

    <table class="table border">
      <thead class="table-light">
        <tr>
          <th>순번</th>
          <th>상담자</th>
          <th>대상</th>
          <th>시간</th>
          <th>내용</th>
        </tr>
      </thead>
      <tbody>
        {% for log in logs %}
        <tr>
          <td>{{ log.id }}</td>
          <td>{{ log.counselor }}</td>
          <td>{{ log.target }}</td>
          <td>{{ log.duration }}분</td>
          <td>{{ log.content }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
