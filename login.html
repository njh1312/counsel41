<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>로그인</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        height: 100vh;
      }
      .login-form {
        width: 100%;
        max-width: 330px;
        margin: auto;
        padding: 15px;
      }
    </style>
  </head>
  <body>
    <div class="login-form text-center shadow-sm bg-white p-4 rounded">
      <h2 class="h3 mb-3 fw-normal">상담 관리 로그인</h2>
      <form action="/login" method="post">
        <input
          type="text"
          name="user_id"
          class="form-control mb-2"
          placeholder="아이디"
          required
          autofocus
        />
        <input
          type="password"
          name="user_pw"
          class="form-control mb-3"
          placeholder="비밀번호"
          required
        />
        <button class="w-100 btn btn-lg btn-primary" type="submit">
          로그인
        </button>
      </form>
      <p class="mt-3 text-muted">관리자 전용 페이지입니다.</p>
    </div>
  </body>
</html>
